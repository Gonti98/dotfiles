---
- name: Machine setup
  hosts: localhost
  become: true
  connection: local
  gather_facts: true

  vars:
    packages:
      - git
      - curl
      - btop
      - neovim
      - eza
      - tree

  tasks:
    - name: Get my user
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Install each package individually
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop: "{{ packages }}"
      ignore_errors: yes
